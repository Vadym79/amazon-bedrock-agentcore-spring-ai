spring.application.name=spring-ai-conference-search-demo
spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.aws.timeout=10m
spring.ai.bedrock.converse.chat.options.max-tokens=100
spring.ai.bedrock.converse.chat.options.model=amazon.nova-lite-v1:0
#cognito.user.pool.name=MyUserPool
#cognito.user.pool.client.name=MyClient

cognito.user.pool.name=UserPoolForAgentCoreMCP
cognito.user.pool.client.name=UserPoolClientWithUserAndPasswordForAgentCoreMCP
cognito.auth.token.resource.server.id=AgentCoreResourceServerId

secrets.manager.secret.name=CognitoUserAndPasswordForAuthToken
spring.ai.mcp.client.type=ASYNC


# configure if if you use MCP through AgentCore Gateway, otherwise leave the value empty
# Don't delete property itself
#amazon.bedrock.agentcore.gateway.url=https://gtw-api-test-8twcw7kcrr.gateway.bedrock-agentcore.us-east-1.amazonaws.com/mcp
amazon.bedrock.agentcore.gateway.url=https://spring-ai-conference-search-agentcore-gateway-xizwpytsgm.gateway.bedrock-agentcore.us-east-1.amazonaws.com/mcp

# configure the runtime.id, aws region and account id if you use MCP through AgentCore Runtime MCP Server,
# otherwise leave all 3 values empty. Don't delete properties themselves
# If both agentcore.runtime.id and amazon.bedrock.agentcore.gateway.url are defined, the first the takes precedence
#amazon.bedrock.agentcore.runtime.id=spring_mcp_conference_search_mcp_server-B6d3WzFoGa
#amazon.bedrock.agentcore.runtime.id=spring_ai_conference_search_agentcore_runtime-6dnMIL9i65
amazon.bedrock.agentcore.runtime.id=
aws.region=us-east-1

logging.level.root=INFO
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.io.modelcontextprotocol.client=DEBUG
logging.level.io.modelcontextprotocol.client.transport=DEBUG
logging.level.io.modelcontextprotocol.spec=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG

