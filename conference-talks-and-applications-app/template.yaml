AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  #https://github.com/aws/serverless-application-model/discussions/3388
  ConferenceTalksAndApplicationsApp
  Sample SAM Template

Parameters:
  Stage:
    Type: String
    Default: prod
    
Globals:
  Function:
    CodeUri: target/conference-talks-and-applications-app-1.0.0-SNAPSHOT.jar
    Runtime: java25
    #SnapStart:
      #ApplyOn: PublishedVersions 
    Timeout: 30 
    MemorySize: 1024
    Architectures:
      - x86_64
    #Tracing: Active
    Environment:
      Variables:
        JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
        
Resources:

  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      DefinitionBody:
          Fn::Transform:
             Name: AWS::Include
             Parameters:
               Location: ConferenceTalksAndApplicationsAppAPI-OpenAPISpec.yaml
      #TracingEnabled: true
      Name: ConferenceTalksAndApplicationsAppAPI
      Description: API for Conference Talks And Applications App
      AccessLogSetting:
        DestinationArn: !Sub ${MyApiLogGroup.Arn} # This Log Group is already created within our SAM Template
        Format: "{'integrationLatency':'$context.integrationLatency', 'latency':'$context.responseLatency', 'requestId':'$context.requestId', 'ip': '$context.identity.sourceIp', 'caller':'$context.identity.caller', 'user':'$context.identity.user','requestTime':'$context.requestTime', 'xrayTraceId':'$context.xrayTraceId', 'wafResponseCode':'$context.wafResponseCode', 'httpMethod':'$context.httpMethod','resourcePath':'$context.resourcePath', 'status':'$context.status','protocol':'$context.protocol', 'responseLength':'$context.responseLength' }"
      #MethodSettings:
       # - MetricsEnabled: True
       #   ResourcePath: '/*'
       #   HttpMethod: '*'
      Auth:
        ApiKeyRequired: true  # sets for all methods
  
      
        
  MyApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
       LogGroupName: !Sub "/aws/apigateway/${MyApi}"
       RetentionInDays: 7
      
  MyApiUsagePlan:
     Type: AWS::ApiGateway::UsagePlan
     DependsOn:  
        - MyApiStage
     Properties:
      ApiStages: 
        - ApiId: !Ref MyApi
          Stage: !Ref Stage
      UsagePlanName: ConferenceTalksAndApplicationsAppUsagePlan
      Description: Usage plan for ConferenceTalksAndApplicationsAppAPI
      Quota:
          Limit: 100
          Period: DAY
      Throttle:
          RateLimit:  100
          BurstLimit: 50

  MyApiKey: 
    Type: AWS::ApiGateway::ApiKey
    DependsOn:  
       - MyApiStage
    Properties: 
      Name: "ConferenceTalksAndApplicationsAppAPIKey"
      Description: "ConferenceTalksAndApplicationsApp API Key"
      Enabled: true
      GenerateDistinctId: false
      Value: a6ZbcDgjkQW10BN56ASR25
      StageKeys:
        - RestApiId: !Ref MyApi
          StageName: !Ref Stage

  MyApiUsagePlanKey:
      Type: "AWS::ApiGateway::UsagePlanKey"
      DependsOn: 
      - MyApi
      Properties:
        KeyId: !Ref MyApiKey
        KeyType: API_KEY
        UsagePlanId: !Ref MyApiUsagePlan


  CreateConferenceApplicationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CreateConferenceApplication
      AutoPublishAlias: liveVersion 
      Handler: software.amazonaws.example.conference.handler.CreateConferenceApplication::handleRequest
      Events:
        PutRequest:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /apply
            Method: post


  CreateConferenceApplicationFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${CreateConferenceApplicationFunction}"
      RetentionInDays: 7


  GetConferenceTalksByTitleSubstringFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetConferenceTalksByTitleSubstring
      AutoPublishAlias: liveVersion 
      Handler: software.amazonaws.example.conference.handler.GetConferenceTalksByTitleSubstring::handleRequest
      Events:
        GetRequestById:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /talks/{titleSubstring}
            Method: get     

  GetConferenceTalksByTitleSubstringFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetConferenceTalksByTitleSubstringFunction}"
      RetentionInDays: 7


Outputs:
  ConferenceTalksAndApplicationsAppAPIEndpoint:
    Description: "API Gateway endpoint URL for Prod stage for Conference Talks And Applications App"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
